<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activate Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="activate.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="card">
        <div class="card-header">
          <div class="logo">
            <div class="logo-icon">🔐</div>
            <div class="logo-name">AuthService</div>
          </div>
          <h2>Activate Account</h2>
          <p>Reactivate your account to regain access</p>
        </div>

        <form class="auth-form" autocomplete="off">
          <!-- Phone Field -->
          <div id="phoneField" class="field">
            <label for="countryCode">Phone Number</label>
            <div class="phone-container">
              <select id="countryCode"></select>
              <input type="text" id="phone" placeholder="Enter phone number" />
            </div>
            <small id="phoneError" class="error"></small>
          </div>

          <!-- Email Field -->
          <div id="emailField" class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" />
            <small id="emailError" class="error"></small>
          </div>

          <!-- Password Field -->
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required />
            <small id="passwordError" class="error"></small>
          </div>

          <!-- Submit Button -->
          <button type="submit">Activate Account</button>

          <!-- Messages -->
          <div id="activateSuccess" class="success"></div>
          <div id="activateError" class="error"></div>
        </form>

        <!-- Links -->
        <div class="links-section">
          <p class="switch">
            <a href="login.html">← Back to Login</a>
          </p>
        </div>
      </div>
    </div>

    <script src="../env.js"></script>
    <script src="countries.js"></script>
    <script src="activate.js"></script>
  </body>
</html>
