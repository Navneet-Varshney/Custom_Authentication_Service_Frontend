<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="password.css" />
  </head>
  <body>
    <form class="auth-form" autocomplete="off">
      <h2>Create New Password</h2>
      <p class="hint">Enter your new password and confirm it</p>

      <div class="field password-field">
        <label>New Password</label>
        <input type="password" id="password" placeholder="Enter new password" />
        <span class="toggle-eye" data-target="password">👁</span>
        <div class="strength-bar" id="strengthBar">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="strength-text" id="strengthText"></div>
        <small id="passwordError" class="error"></small>
      </div>

      <div class="field password-field">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" />
        <span class="toggle-eye" data-target="confirmPassword">👁</span>
        <small id="confirmError" class="error"></small>
      </div>

      <button type="submit">Reset Password</button>
      <div id="successMessage" class="success"></div>
    </form>

    <script src="../env.js"></script>
    <script src="validation.js"></script>
    <script src="messages.js"></script>
    <script type="module" src="password.js"></script>
  </body>
</html>
