<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureAuth - Initializing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      /* Animated background */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle at 20% 50%,
          rgba(102, 126, 234, 0.1) 0%,
          transparent 50%
        ),
        radial-gradient(
          circle at 80% 80%,
          rgba(240, 147, 251, 0.1) 0%,
          transparent 50%
        );
        animation: gradientShift 15s ease infinite;
        pointer-events: none;
        z-index: 1;
      }

      @keyframes gradientShift {
        0%, 100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(-50px, -50px);
        }
      }

      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo-container {
        margin-bottom: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .logo-icon {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        animation: bounceIcon 2s ease-in-out infinite;
      }

      @keyframes bounceIcon {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .logo-text {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .loader-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        padding: 40px;
      }

      /* Spinner Loader */
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(102, 126, 234, 0.2);
        border-top-color: #667eea;
        border-right-color: #764ba2;
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loader-text {
        font-size: 16px;
        color: #cbd5e1;
        font-weight: 500;
        letter-spacing: 0.5px;
      }

      .dots {
        display: flex;
        gap: 4px;
        justify-content: center;
        margin-top: -8px;
      }

      .dot {
        width: 6px;
        height: 6px;
        background: #667eea;
        border-radius: 50%;
        animation: dotPulse 1.5s ease-in-out infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes dotPulse {
        0%, 100% {
          opacity: 0.4;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }

      .subtitle {
        font-size: 13px;
        color: #94a3b8;
        margin-top: 12px;
        letter-spacing: 0.5px;
      }

      /* Loading bar */
      .progress-container {
        width: 200px;
        height: 4px;
        background: rgba(102, 126, 234, 0.1);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 16px;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        border-radius: 10px;
        animation: progress 3s ease-in-out forwards;
        box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
      }

      @keyframes progress {
        0% {
          width: 0%;
        }
        80% {
          width: 85%;
        }
        100% {
          width: 100%;
        }
      }

      .text-below {
        font-size: 12px;
        color: #64748b;
        margin-top: 20px;
        opacity: 0;
        animation: fadeInUp 0.8s ease-out 1s forwards;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Logo Section -->
      <div class="logo-container">
        <div class="logo-icon">
          <span class="material-icons" style="font-size: 32px;">security</span>
        </div>
        <div class="logo-text">SecureAuth</div>
      </div>

      <!-- Loader Section -->
      <div class="loader-box">
        <div class="spinner"></div>
        <div>
          <div class="loader-text">Initializing SecureAuth</div>
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
        <div class="progress-container">
          <div class="progress-bar"></div>
        </div>
        <div class="subtitle">Setting up your secure environment</div>
      </div>

      <p class="text-below">
        Redirecting to <a href="auth/login.html" style="color: #667eea; text-decoration: none; font-weight: 500;">sign in</a>...
      </p>
    </div>

    <script>
      console.log("✅ Index page loaded - Starting secure authentication flow");
      
      // Redirect after 3.5 seconds to allow loader animation to complete
      setTimeout(() => {
        console.log("🚀 Redirecting to login...");
        window.location.href = "auth/login.html";
      }, 3500);

      // Fallback redirect if JavaScript is disabled
      document.head.innerHTML += '<meta http-equiv="refresh" content="4; url=auth/login.html" />';
    </script>
  </body>
</html>
